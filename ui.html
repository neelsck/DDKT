<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Babel</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <style>
    :root {
      --ink: #24171a;
      --muted: #756569;
      --soft: #f6edef;
      --line: #e3d6d9;
      --paper: #fbf8f7;
      --panel: #ffffff;
      --green: #7f1d2d;
      --green-2: #641525;
      --green-bg: #f8e7eb;
      --blue: #246b9f;
      --blue-bg: #eef6fb;
      --amber: #a86308;
      --amber-bg: #fff6e7;
      --red: #b83b3b;
      --red-bg: #fceaea;
      --violet: #7257a8;
      --violet-bg: #f3f1f8;
      --canvas: #fffdfb;
      --canvas-line: #eadfe0;
      --shadow: 0 18px 60px rgba(67, 33, 40, 0.08);
    }
    * { box-sizing: border-box; margin: 0; }
    body {
      background: var(--paper);
      color: var(--ink);
      font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
      line-height: 1.45;
      font-weight: 400;
    }
    button, textarea, input { font: inherit; }
    .mono { font-family: 'IBM Plex Mono', 'JetBrains Mono', 'Fira Code', ui-monospace, monospace; }

    .btn {
      border: 1px solid var(--line); background: #fff; color: var(--ink);
      border-radius: 8px; padding: 9px 14px; font-weight: 500;
      cursor: pointer; font-size: 13px; transition: background 0.12s, border-color 0.12s, transform 0.12s;
    }
    .btn:hover { background: #faf3f4; border-color: #d7c5c9; }
    .btn:disabled { opacity: 0.55; cursor: wait; transform: none; }
    .btn-green { background: var(--green); border-color: var(--green); color: #fff; }
    .btn-green:hover { background: var(--green-2); }

    .home {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px 18px;
    }
    .home-shell { width: min(760px, 100%); }
    .home-brand {
      text-align: center;
      font-weight: 500;
      font-size: 20px;
      margin-bottom: 26px;
    }
    .home-kicker {
      display: flex; justify-content: center; gap: 8px; flex-wrap: wrap;
      margin-bottom: 22px; color: var(--muted); font-size: 12px;
    }
    .home-pill {
      border: 1px solid var(--line); background: #fff; border-radius: 999px;
      padding: 5px 11px;
    }
    .home h1 {
      text-align: center;
      font-size: 56px;
      letter-spacing: 0;
      line-height: 1.02;
      margin-bottom: 28px;
      font-weight: 400;
    }
    .prompt-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: var(--shadow);
      padding: 14px;
    }
    .prompt-box {
      min-height: 112px; width: 100%; resize: vertical; border: none; outline: none;
      color: var(--ink); font-size: 16px; line-height: 1.5; padding: 8px;
      background: transparent;
    }
    .prompt-actions {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; border-top: 1px solid var(--line); padding-top: 12px;
      flex-wrap: wrap;
    }
    .file-trigger {
      display: inline-flex; align-items: center; gap: 8px;
      border: 1px dashed #b7c9bd; border-radius: 999px;
      padding: 8px 12px; cursor: pointer; color: var(--muted);
      background: #fffafa; font-size: 13px;
    }
    .file-trigger input { display: none; }
    .file-trigger.over { background: var(--green-bg); border-color: var(--green); color: var(--green-2); }
    .upload-result {
      display: flex; align-items: center; gap: 8px; padding: 7px 0;
      font-size: 12px; border-top: 1px solid var(--line); color: var(--muted);
    }
    .upload-ok { color: var(--green); font-weight: 500; }
    .upload-err { color: var(--red); font-weight: 500; }
    .home-footer {
      margin-top: 18px; text-align: center; color: var(--muted); font-size: 13px;
    }

    .workspace {
      height: 100vh;
      overflow: hidden;
      display: grid;
      grid-template-columns: 232px minmax(0, 1fr) 410px;
      background: var(--paper);
    }
    .contract-rail {
      border-right: 1px solid var(--line);
      background: #fff;
      padding: 16px;
      display: flex; flex-direction: column; gap: 16px;
      height: 100vh;
      overflow: auto;
    }
    .brand {
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
    }
    .brand h2 { font-size: 22px; letter-spacing: 0; font-weight: 500; }
    .rail-label {
      font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--muted); font-weight: 500; margin-bottom: 8px;
    }
    .contract-list { display: flex; flex-direction: column; gap: 7px; }
    .contract-item {
      width: 100%; text-align: left; border: 1px solid transparent;
      background: transparent; padding: 10px; border-radius: 9px; cursor: pointer;
    }
    .contract-item:hover { background: #faf3f4; }
    .contract-item.active { background: var(--green-bg); border-color: #e3b6bf; }
    .contract-title { display: block; font-weight: 500; font-size: 13px; }
    .contract-meta { display: none; }
    .mini-upload {
      margin-top: auto;
      border: 1px dashed #b7c9bd; border-radius: 10px; padding: 12px;
      font-size: 12px; color: var(--muted); cursor: pointer; background: #fff;
    }
    .mini-upload input { display: none; }

    .analysis-pane {
      min-width: 0;
      padding: 18px;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
      gap: 14px;
      height: 100vh;
      overflow: auto;
    }
    .workspace-head {
      background: var(--panel); border: 1px solid var(--line);
      border-radius: 8px; padding: 14px; display: flex; justify-content: space-between;
      gap: 16px; align-items: flex-start;
    }
    .workspace-head h1 { font-size: 22px; letter-spacing: 0; font-weight: 400; }
    .workspace-head p { color: var(--muted); font-size: 13px; margin-top: 4px; }
    .agent-grid {
      display: grid; grid-template-columns: repeat(5, minmax(112px, 1fr)); gap: 8px;
    }
    .expert-tile {
      border: 1px solid var(--line); background: var(--panel); border-radius: 8px;
      padding: 11px; cursor: pointer; min-height: 86px;
      display: flex; flex-direction: column; gap: 7px;
      transition: border-color 0.12s, transform 0.12s, box-shadow 0.12s;
    }
    .expert-tile:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(25, 42, 32, 0.06); }
    .expert-tile.active { border-color: var(--agent-color); box-shadow: inset 0 0 0 1px var(--agent-color); }
    .expert-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .expert-dot { width: 10px; height: 10px; border-radius: 999px; background: var(--agent-color); }
    .expert-state { font-size: 10px; color: var(--green); font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; }
    .expert-name { font-size: 13px; font-weight: 500; line-height: 1.15; }
    .expert-focus { color: var(--muted); font-size: 11px; line-height: 1.35; display: none; }
    .expert-hit { display: none; }

    .map-card {
      background: var(--panel); border: 1px solid var(--line);
      border-radius: 8px; overflow: hidden; min-height: 0;
    }
    .map-head {
      display: flex; justify-content: space-between; align-items: flex-start;
      padding: 13px 14px; border-bottom: 1px solid var(--line); gap: 14px;
    }
    .map-head h2 { font-size: 16px; font-weight: 500; }
    .map-head p { color: var(--muted); font-size: 12px; margin-top: 3px; }
    .highlight-pills { display: flex; gap: 7px; flex-wrap: wrap; justify-content: flex-end; }
    .highlight-pill {
      border: 1px solid var(--line); border-radius: 999px; padding: 4px 8px;
      font-size: 11px; color: var(--muted); background: #fff;
    }
    .canvas {
      background: var(--canvas);
      border-bottom: 1px solid var(--canvas-line);
      overflow: hidden;
      height: 320px;
      position: relative;
    }
    .diagram-frame {
      height: 100%;
      overflow: hidden;
      position: relative;
      padding: 8px;
      cursor: grab;
      user-select: none;
    }
    .diagram-frame.dragging { cursor: grabbing; }
    .diagram-toolbar {
      position: absolute;
      right: 10px;
      top: 10px;
      z-index: 2;
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 6px;
    }
    .diagram-btn {
      width: 36px;
      height: 28px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      line-height: 1;
    }
    .diagram-help {
      position: absolute;
      left: 12px;
      bottom: 10px;
      z-index: 2;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.86);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 5px 9px;
      font-size: 11px;
    }
    .map-loading {
      height: 100%;
      display: grid;
      place-items: center;
      color: var(--muted);
      background:
        radial-gradient(circle at 50% 40%, rgba(127, 29, 45, 0.08), transparent 28%),
        var(--canvas);
    }
    .map-loading-inner {
      text-align: center;
      display: grid;
      gap: 12px;
      justify-items: center;
      font-size: 13px;
    }
    .map-orbit {
      width: 52px;
      height: 52px;
      border: 1px solid #decdd0;
      border-radius: 999px;
      position: relative;
      animation: mapSpin 1.8s linear infinite;
    }
    .map-orbit::after {
      content: "";
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: var(--green);
      position: absolute;
      top: -5px;
      left: 21px;
      box-shadow: 0 0 18px rgba(127, 29, 45, 0.28);
    }
    @keyframes mapSpin { to { transform: rotate(360deg); } }
    .expert-analysis-panel {
      border-bottom: 1px solid var(--line);
      padding: 14px;
      background: #fcf8f7;
    }
    .expert-analysis-copy {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 13px 14px;
      max-height: 250px;
      overflow: auto;
      font-size: 14px;
      line-height: 1.6;
    }
    .expert-analysis-copy h3 {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 8px;
      font-weight: 500;
    }
    .expert-analysis-status { color: var(--muted); font-size: 12px; margin-top: 9px; }
    .detail-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 14px;
    }
    .detail-panel {
      border: 1px solid var(--line); border-radius: 8px; padding: 12px;
      max-height: 240px; overflow: auto; background: #fcf8f7;
    }
    .detail-panel h3 {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--muted); margin-bottom: 8px;
    }
    .rule-row, .state-row {
      padding: 8px; border-radius: 8px; background: #fff; border: 1px solid var(--line);
      margin-bottom: 6px; font-size: 12px;
    }
    .rule-row.hot, .state-row.hot { border-color: var(--agent-color); background: color-mix(in srgb, var(--agent-color) 10%, white); }
    .rule-id, .state-id { font-family: 'IBM Plex Mono', ui-monospace, monospace; font-size: 11px; font-weight: 600; }

    .chat-rail {
      border-left: 1px solid var(--line);
      background: #fff;
      height: 100vh;
      min-height: 0;
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
    }
    .chat-head { padding: 18px; border-bottom: 1px solid var(--line); }
    .chat-head h2 { font-size: 16px; }
    .chat-head p { color: var(--muted); font-size: 12px; margin-top: 4px; }
    .chat-scroll { min-height: 0; overflow: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .msg { max-width: 100%; border-radius: 8px; padding: 11px 12px; font-size: 13px; line-height: 1.48; white-space: pre-wrap; }
    .msg.assistant { background: var(--soft); color: var(--ink); }
    .msg.user {
      align-self: flex-end;
      max-width: 88%;
      background: var(--ink);
      color: #fff;
    }
    .msg.final-answer {
      background: #fffafa;
      border: 1px solid #e5cbd0;
      border-radius: 8px;
      padding: 15px;
      font-size: 15px;
      line-height: 1.6;
      white-space: normal;
    }
    .response-list {
      display: grid;
      gap: 15px;
    }
    .response-list.compact {
      gap: 13px;
    }
    .response-bullet {
      display: grid;
      grid-template-columns: 8px minmax(0, 1fr);
      gap: 11px;
      align-items: start;
    }
    .response-dot {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: var(--green);
      margin-top: 0.75em;
    }
    .response-bullet.primary {
      color: var(--ink);
      font-size: 17px;
      line-height: 1.55;
    }
    .response-bullet.support {
      color: var(--muted);
      font-size: 13.5px;
      line-height: 1.55;
    }
    .response-list.compact .response-bullet.primary {
      font-size: 16px;
    }
    .response-list.compact .response-bullet.support {
      font-size: 13px;
    }
    .thinking-card {
      border: 1px solid var(--line); background: #fcf8f7; border-radius: 8px; padding: 12px;
    }
    .thinking-title { display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 500; margin-bottom: 9px; }
    .thinking-dots { display: inline-flex; gap: 3px; }
    .thinking-dots span {
      width: 5px; height: 5px; border-radius: 999px; background: var(--green);
      animation: pulse 1.1s infinite ease-in-out;
    }
    .thinking-dots span:nth-child(2) { animation-delay: 0.15s; }
    .thinking-dots span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes pulse { 0%, 80%, 100% { opacity: .25; transform: translateY(0); } 40% { opacity: 1; transform: translateY(-3px); } }
    .thinking-step {
      display: flex; gap: 8px; align-items: flex-start; color: var(--muted);
      font-size: 12px; padding: 5px 0;
    }
    .step-dot { width: 7px; height: 7px; border-radius: 999px; background: var(--line); margin-top: 5px; flex: 0 0 auto; }
    .step-dot.active { background: var(--green); }
    .step-dot.done { background: var(--blue); }
    .memory-write {
      border: 1px solid #e3b6bf; background: var(--green-bg); border-radius: 10px;
      padding: 10px; color: var(--green-2); font-size: 11px; white-space: pre-wrap;
    }
    .chat-compose {
      border-top: 1px solid var(--line); padding: 12px; display: flex; gap: 8px;
    }
    .chat-compose textarea {
      flex: 1; min-height: 48px; resize: vertical; border: 1px solid var(--line);
      border-radius: 8px; padding: 9px 10px; outline-color: var(--green); font-size: 13px;
    }
    .empty-state {
      text-align: center; padding: 60px 24px; color: var(--muted);
    }
    .spinner {
      display: inline-block; width: 15px; height: 15px;
      border: 2px solid var(--line); border-top-color: var(--green);
      border-radius: 50%; animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 1100px) {
      .workspace { grid-template-columns: 220px minmax(0, 1fr); }
      .chat-rail { grid-column: 1 / -1; min-height: 520px; border-left: none; border-top: 1px solid var(--line); }
      .agent-grid { grid-template-columns: repeat(2, minmax(140px, 1fr)); }
      .expert-analysis-panel { grid-template-columns: 1fr; }
    }
    @media (max-width: 760px) {
      .workspace { grid-template-columns: 1fr; }
      .home h1 { font-size: 38px; }
      .contract-rail { min-height: auto; border-right: none; border-bottom: 1px solid var(--line); }
      .detail-grid { grid-template-columns: 1fr; }
      .expert-analysis-panel { grid-template-columns: 1fr; }
      .workspace-head { flex-direction: column; }
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;
const mono = "'IBM Plex Mono','JetBrains Mono','Fira Code',ui-monospace,monospace";


/* ═══════════════════════════════════════════
   AUTO LAYOUT — BFS-layered graph positioning
   ═══════════════════════════════════════════ */

function autoLayout(states, transitions, initial) {
  const ids = states.map(s => s.id), n = ids.length;
  if (!n) return { pos: {}, w: 400, h: 300 };

  const adj = {};
  ids.forEach(id => (adj[id] = new Set()));
  transitions.forEach(t => {
    const fs = t.from_states || t.from || [t.from_state];
    (Array.isArray(fs) ? fs : [fs]).forEach(f => {
      if (adj[f]) adj[f].add(t.to_state || t.to);
    });
  });

  const depth = {};
  const queue = [initial];
  depth[initial] = 0;
  while (queue.length) {
    const c = queue.shift();
    for (const nb of adj[c] || []) {
      if (depth[nb] === undefined) { depth[nb] = depth[c] + 1; queue.push(nb); }
    }
  }
  const maxD = Math.max(0, ...Object.values(depth));
  ids.forEach(id => { if (depth[id] === undefined) depth[id] = maxD + 1; });

  const layers = {};
  ids.forEach(id => (layers[depth[id]] = layers[depth[id]] || []).push(id));

  const nL = Object.keys(layers).length;
  const nodeW = 180, nodeH = 56, gapX = 100, gapY = 50, padX = 100, padY = 60;
  const maxPerLayer = Math.max(...Object.values(layers).map(l => l.length));
  const totalW = padX * 2 + nL * nodeW + (nL - 1) * gapX;
  const totalH = padY * 2 + maxPerLayer * nodeH + (maxPerLayer - 1) * gapY;

  const pos = {};
  Object.entries(layers).forEach(([d, grp]) => {
    const di = parseInt(d);
    const x = padX + nodeW / 2 + di * (nodeW + gapX);
    const colH = grp.length * nodeH + (grp.length - 1) * gapY;
    const startY = (totalH - colH) / 2;
    grp.forEach((id, i) => {
      pos[id] = { x, y: startY + nodeH / 2 + i * (nodeH + gapY) };
    });
  });

  return { pos, w: Math.max(totalW, 600), h: Math.max(totalH, 300) };
}


/* ═══════════════════════════════════════════
   CLIENT-SIDE DECOMPILER
   ═══════════════════════════════════════════ */

function decompileFSM(fsm) {
  if (!fsm) return "";
  const L = [];
  const cid = fsm.contract_id || "?";
  const parties = (fsm.parties || []).slice().sort();
  const states = (fsm.states || []).slice().sort((a, b) => a.id.localeCompare(b.id));
  const transitions = (fsm.transitions || []).slice().sort((a, b) => a.id.localeCompare(b.id));
  const rules = (fsm.rules || []).slice().sort((a, b) => a.id.localeCompare(b.id));
  const params = fsm.params || {};
  const initial = fsm.initial_state;
  const unmappable = (fsm.unmappable_rules || []).slice().sort((a, b) => (a.id || "").localeCompare(b.id || ""));

  L.push("=".repeat(60), `CONTRACT: ${cid}`, "=".repeat(60), "");
  L.push("PARTIES", "─".repeat(40));
  parties.forEach((p, i) => L.push(`  ${i + 1}. ${p}`));
  L.push("");

  const am = params.amounts || {}, ra = params.rates || {}, du = params.durations || {};
  if (Object.keys(am).length || Object.keys(ra).length || Object.keys(du).length) {
    L.push("CONTRACT PARAMETERS", "─".repeat(40));
    Object.entries(am).sort().forEach(([k, v]) => L.push(`  ${k.replace(/_/g, " ")}: $${parseFloat(v).toLocaleString()}`));
    Object.entries(ra).sort().forEach(([k, v]) => { const r = parseFloat(v); L.push(`  ${k.replace(/_/g, " ")}: ${r < 1 ? (r * 100).toFixed(2) + "%" : v}`); });
    Object.entries(du).sort().forEach(([k, v]) => L.push(`  ${k.replace(/_/g, " ")}: ${v} days`));
    L.push("");
  }

  L.push("CONTRACT STATES", "─".repeat(40));
  states.forEach(s => {
    let m = ""; if (s.id === initial) m = " <- initial"; if (s.terminal) m = " <- terminal";
    L.push(`  ${s.description}${m}`);
  });
  L.push("");

  const mappable = rules.filter(r => r.mappable !== false);
  if (mappable.length) {
    L.push("RULES", "─".repeat(40));
    mappable.forEach(r => {
      L.push(`  ${r.id} [${r.type}] ${r.party} -> ${r.counterparty}`);
      L.push(`    ${r.action}`);
      if (r.description) L.push(`    ${r.description}`);
      (r.triggers || []).forEach(t => L.push(`    Trigger [${t.type}]: ${t.condition}`));
      (r.effects || []).forEach(e => {
        L.push(`    Effect [${e.type}]: ${e.description}`);
        if (e.payment_formula) L.push(`      Formula: ${e.payment_formula}`);
        if (e.cap) L.push(`      Cap: $${e.cap}`);
      });
      L.push("");
    });
  }

  L.push("STATE TRANSITIONS", "─".repeat(40));
  const byS = {};
  transitions.forEach(t => {
    const fs = t.from_states || t.from || [t.from_state];
    (Array.isArray(fs) ? fs : [fs]).forEach(f => (byS[f] = byS[f] || []).push(t));
  });
  states.forEach(s => {
    const ts = byS[s.id]; if (!ts) return;
    L.push(`  When in "${s.description}":`);
    ts.sort((a, b) => a.id.localeCompare(b.id)).forEach(t => {
      const ev = (t.event_type || "").replace(/_/g, " ");
      const tgt = states.find(st => st.id === (t.to_state || t.to));
      L.push(`    On "${ev}":`);
      if (t.guard) L.push(`      Guard: ${t.guard}`);
      if (t.description) L.push(`      ${t.description}`);
      const same = (t.from_states || t.from || []).every(f => f === (t.to_state || t.to));
      L.push(`      -> ${same ? "remains" : `"${tgt?.description || t.to_state || t.to}"`}`);
    });
    L.push("");
  });

  if (unmappable.length) {
    L.push("UNMODELED RULES", "─".repeat(40));
    unmappable.forEach(r => {
      L.push(`  ${r.id} [${r.type}] ${r.description || r.action || ""}`);
      if (r.unmappable_reason) L.push(`    Reason: ${r.unmappable_reason}`);
    });
    L.push("");
  }
  L.push("=".repeat(60), "END OF CONTRACT", "=".repeat(60));
  return L.join("\n");
}

function cleanId(cid) {
  return (cid || "").replace(/^C_/, "").replace(/_contract$/i, "").replace(/_/g, " ");
}

function textBlob(obj) {
  return JSON.stringify(obj || {}).toLowerCase();
}

function getExpert(id) {
  return EXPERTS.find(e => e.id === id) || EXPERTS[0];
}

function getExpertHighlight(fsm, expert) {
  if (!fsm || !expert) return { stateIds: [], transitionIds: [], ruleIds: [] };
  const keys = expert.keywords || [];
  const rules = fsm.rules || [];
  const transitions = fsm.transitions || [];
  const states = fsm.states || [];

  const ruleIds = new Set();
  rules.forEach(rule => {
    const blob = textBlob(rule);
    if (keys.some(k => blob.includes(k))) ruleIds.add(rule.id);
  });

  const transitionIds = new Set();
  transitions.forEach(t => {
    const blob = textBlob(t);
    if (keys.some(k => blob.includes(k))) transitionIds.add(t.id);
    if ((t.effects || []).some(effect => ruleIds.has(effect.target_rule_id))) transitionIds.add(t.id);
  });

  const stateIds = new Set();
  states.forEach(state => {
    const blob = textBlob(state);
    if (keys.some(k => blob.includes(k))) stateIds.add(state.id);
    if ((state.active_rule_ids || []).some(id => ruleIds.has(id))) stateIds.add(state.id);
  });

  transitions.forEach(t => {
    if (!transitionIds.has(t.id)) return;
    (t.from_states || []).forEach(id => stateIds.add(id));
    if (t.to_state) stateIds.add(t.to_state);
  });

  return {
    stateIds: [...stateIds],
    transitionIds: [...transitionIds],
    ruleIds: [...ruleIds],
  };
}

function normalizeAnswerText(text) {
  return String(text || "")
    .replace(/\r/g, "\n")
    .replace(/```[\s\S]*?```/g, " ")
    .replace(/\*\*/g, "")
    .replace(/^#{1,6}\s*/gm, "")
    .replace(/\b(?:Final answer|Final takeaways|Executive summary|Synthesis methodology|Specialist read|What matters|Contract proof|Memory note)\b\s*:*/gi, " ")
    .replace(/\b(?:The move|Do this next|Do not do this|Watch-outs|Why this works|FSM proof)\b\s*:*/gi, " ")
    .replace(/^\s*[-*_]{3,}\s*$/gm, " ")
    .trim();
}

function stripVariableNames(text) {
  return String(text || "")
    .replace(/\bC_[A-Z0-9_]+(?:_contract)?\b/g, "the contract")
    .replace(/\bTR[_A-Z0-9-]*\d*\b/g, "that step")
    .replace(/\bR\d+\b/g, "that rule")
    .replace(/\b[A-Z][A-Z0-9]+_[A-Z0-9_]+\b/g, "that stage")
    .replace(/\bFSMs?\b/g, "contract map")
    .replace(/\bIDs?\b/g, "details")
    .replace(/\s+/g, " ")
    .trim();
}

function finishSentence(sentence) {
  const cleaned = stripVariableNames(sentence)
    .replace(/\s+([.,!?;:])/g, "$1")
    .replace(/\s+/g, " ")
    .trim();
  if (!cleaned) return "";
  if (/[.!?]$/.test(cleaned)) return cleaned;
  return `${cleaned}.`;
}

function completeSentences(text) {
  const cleaned = normalizeAnswerText(text);
  const lineItems = cleaned.split("\n")
    .map(line => line.replace(/^[-*]\s*/, "").replace(/^\d+[.)]\s*/, "").trim())
    .filter(Boolean)
    .filter(line => !line.includes("...") && !line.includes("…"));
  const joined = lineItems.join(" ");
  const sentences = joined.match(/[^.!?]+[.!?]+/g) || lineItems;
  const seen = new Set();
  return sentences
    .map(finishSentence)
    .filter(sentence => sentence.length > 18)
    .filter(sentence => !sentence.includes("...") && !sentence.includes("…"))
    .filter(sentence => !/^(final|answer|section|scenario|methodology)$/i.test(sentence))
    .filter(sentence => {
      const key = sentence.toLowerCase();
      if (seen.has(key)) return false;
      seen.add(key);
      return true;
    });
}

function asDirectBullets(sentences, count = 4) {
  const picked = sentences.slice(0, count);
  return picked.length ? picked.map(sentence => `- ${sentence}`).join("\n") : "- No contract-backed answer is available yet.";
}

function finalTakeaways(answer) {
  return asDirectBullets(completeSentences(answer), 4);
}

function expertFindingText(agent, expert, loading) {
  if (loading && agent?.status === "running") {
    return `- ${expert.fullName} is checking shared memory and contract paths.`;
  }
  if (agent?.output) {
    const allSentences = completeSentences(agent.output);
    const keywords = [
      ...(expert.keywords || []),
      "must", "should", "do not", "avoid", "risk", "cash", "payment", "delivery",
      "termination", "proof", "path", "rule", "state", "transition", "TR", "R",
    ];
    const focused = allSentences.filter(sentence =>
      keywords.some(keyword => sentence.toLowerCase().includes(String(keyword).toLowerCase()))
    );
    return asDirectBullets((focused.length ? focused : allSentences), 4);
  }
  if (loading) {
    return `- ${expert.fullName} is queued.`;
  }
  return "- Run an analysis, then click an expert tile to see the useful findings.";
}

function ResponseBullets({ text, compact = false }) {
  const bullets = String(text || "")
    .split("\n")
    .map(line => line.replace(/^[-*]\s*/, "").trim())
    .filter(Boolean);

  if (!bullets.length) return null;

  return (
    <div className={`response-list ${compact ? "compact" : ""}`}>
      {bullets.map((line, index) => (
        <div className={`response-bullet ${index === 0 ? "primary" : "support"}`} key={`${index}-${line.slice(0, 24)}`}>
          <span className="response-dot"></span>
          <span>{finishSentence(line)}</span>
        </div>
      ))}
    </div>
  );
}

   SVG DIAGRAM (adapted from visualizer.html)

function Diagram({ fsm, layout, highlight, expert }) {
  const { pos, w, h } = layout;
  const states = fsm.states || [];
  const transitions = fsm.transitions || [];
  const initial = fsm.initial_state;
  const NW = 170, NH = 48;
  const [tip, setTip] = useState(null);
  const [zoom, setZoom] = useState(1);
  const [pan, setPan] = useState({ x: 0, y: 0 });
  const [drag, setDrag] = useState(null);
  const svgRef = useRef(null);
  const hotStates = new Set(highlight?.stateIds || []);
  const hotTransitions = new Set(highlight?.transitionIds || []);
  const accent = expert?.color || "#7f1d2d";

  useEffect(() => {
    setZoom(1);
    setPan({ x: 0, y: 0 });
    setDrag(null);
    setTip(null);
  }, [fsm?.contract_id, expert?.id]);

  const edges = {};
  transitions.forEach(t => {
    const froms = t.from_states || t.from || [t.from_state];
    const to = t.to_state || t.to;
    (Array.isArray(froms) ? froms : [froms]).forEach(f => {
      const k = `${f}→${to}`;
      (edges[k] = edges[k] || []).push(t);
    });
  });

  const handleEnter = (e, s) => {
    const el = svgRef.current;
    if (!el) return;
    const rect = el.getBoundingClientRect();
    setTip({
      x: e.clientX - rect.left,
      y: e.clientY - rect.top - 12,
      state: s,
    });
  };

  const clampZoom = value => Math.max(1, Math.min(2.8, value));
  const resetView = () => {
    setZoom(1);
    setPan({ x: 0, y: 0 });
    setTip(null);
  };
  const bumpZoom = factor => {
    setZoom(current => clampZoom(current * factor));
    setTip(null);
  };
  const beginDrag = e => {
    if (e.button !== 0) return;
    e.currentTarget.setPointerCapture?.(e.pointerId);
    setDrag({ x: e.clientX, y: e.clientY, pan });
    setTip(null);
  };
  const moveDrag = e => {
    if (!drag || !svgRef.current) return;
    const rect = svgRef.current.getBoundingClientRect();
    const scaleX = w / Math.max(rect.width, 1);
    const scaleY = h / Math.max(rect.height, 1);
    setPan({
      x: drag.pan.x + (e.clientX - drag.x) * scaleX / zoom,
      y: drag.pan.y + (e.clientY - drag.y) * scaleY / zoom,
    });
  };
  const endDrag = () => setDrag(null);
  const handleWheel = e => {
    e.preventDefault();
    bumpZoom(e.deltaY < 0 ? 1.12 : 0.9);
  };

  return (
    <div
      ref={svgRef}
      className={`diagram-frame ${drag ? "dragging" : ""}`}
      onPointerDown={beginDrag}
      onPointerMove={moveDrag}
      onPointerUp={endDrag}
      onPointerCancel={endDrag}
      onWheel={handleWheel}
    >
      <div className="diagram-toolbar" onPointerDown={e => e.stopPropagation()} onWheel={e => e.stopPropagation()}>
        <button className="diagram-btn" title="Zoom out" onClick={() => bumpZoom(0.85)}>-</button>
        <button className="diagram-btn" title="Reset view" onClick={resetView}>Fit</button>
        <button className="diagram-btn" title="Zoom in" onClick={() => bumpZoom(1.18)}>+</button>
      </div>
      <div className="diagram-help">{zoom === 1 ? "Full map" : `${Math.round(zoom * 100)}%`} · drag to move</div>
      {tip && (
        <div style={{
          position: "absolute", left: tip.x, top: tip.y, transform: "translate(-50%, -100%)",
          background: "#ffffff", border: "1px solid #e3d6d9", borderRadius: 6,
          padding: "8px 12px", maxWidth: 320, zIndex: 10, pointerEvents: "none",
          boxShadow: "0 10px 30px rgba(67,33,40,0.14)", color: "#24171a",
        }}>
          <div style={{ fontSize: 11, fontWeight: 500, marginBottom: 3 }}>{tip.state.description}</div>
          <div style={{ fontSize: 9, fontFamily: mono, color: "#756569" }}>
            {tip.state.id}{tip.state.terminal ? " · terminal" : ""}{tip.state.id === initial ? " · initial" : ""}
          </div>
          {(tip.state.active_rule_ids || []).length > 0 && (
            <div style={{ fontSize: 9, fontFamily: mono, color: "#756569", marginTop: 4 }}>
              Rules: {tip.state.active_rule_ids.join(", ")}
            </div>
          )}
        </div>
      )}
      <svg viewBox={`0 0 ${w} ${h}`} width="100%" height="100%" preserveAspectRatio="xMidYMid meet" style={{ display: "block" }}>
        <defs>
          <marker id="ar" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="6" markerHeight="4" orient="auto">
            <path d="M0 0L10 3.5L0 7z" fill="#a9979c" />
          </marker>
          <filter id="gl"><feGaussianBlur stdDeviation="3" result="b" /><feMerge><feMergeNode in="b" /><feMergeNode in="SourceGraphic" /></feMerge></filter>
        </defs>

        <g transform={`translate(${pan.x} ${pan.y}) scale(${zoom})`}>
        {/* Edges */}
        {Object.entries(edges).map(([k, ts]) => {
          const [fk, tk] = k.split("→");
          const fp = pos[fk], tp = pos[tk];
          if (!fp || !tp) return null;

          if (fk === tk) {
            return <path key={k} d={`M${fp.x - 20} ${fp.y - NH / 2}C${fp.x - 55} ${fp.y - NH - 30},${fp.x + 55} ${fp.y - NH - 30},${fp.x + 20} ${fp.y - NH / 2}`}
              fill="none" stroke="#a9979c" strokeWidth={0.8} markerEnd="url(#ar)" />;
          }
          const dx = tp.x - fp.x, dy = tp.y - fp.y, ln = Math.sqrt(dx * dx + dy * dy) || 1;
          const nx = dx / ln, ny = dy / ln;
          const x1 = fp.x + nx * (NW / 2 + 4), y1 = fp.y + ny * (NH / 2 + 2);
          const x2 = tp.x - nx * (NW / 2 + 4), y2 = tp.y - ny * (NH / 2 + 2);
          const mx = (x1 + x2) / 2 - ny * 18, my = (y1 + y2) / 2 + nx * 18;

          const label = ts.length === 1 ? ts[0].event_type?.replace(/_/g, " ") : `${ts.length} events`;
          const lx = (x1 + mx) / 2, ly = (y1 + my) / 2;

          const hot = ts.some(t => hotTransitions.has(t.id));
          return <g key={k}>
            <path d={`M${x1} ${y1}Q${mx} ${my} ${x2} ${y2}`} fill="none" stroke={hot ? accent : "#a9979c"} strokeWidth={hot ? 2.2 : 0.8} markerEnd="url(#ar)" />
            {label && <text x={lx} y={ly - 6} textAnchor="middle" fill={hot ? accent : "#8b7a7f"} fontSize="7" fontFamily={mono}>{truncate(label, 22)}</text>}
          </g>;
        })}

        {/* Nodes */}
        {states.map(s => {
          const p = pos[s.id];
          if (!p) return null;
          let fi = "#ffffff", st = "#d8cdd0", tx = "#4e4145";
          if (s.id === initial) { st = "#7f1d2d"; tx = "#7f1d2d"; fi = "#fff7f8"; }
          if (s.terminal) { st = "#b83b3b"; tx = "#7f1d1d"; fi = "#fff1f1"; }
          if (hotStates.has(s.id)) { st = accent; tx = accent; fi = "#fbebef"; }

          return (
            <g key={s.id}
              onMouseEnter={(e) => handleEnter(e, s)}
              onMouseMove={(e) => handleEnter(e, s)}
              onMouseLeave={() => setTip(null)}
              style={{ cursor: "pointer" }}>
              <rect x={p.x - NW / 2} y={p.y - NH / 2} width={NW} height={NH} rx={6}
                fill={fi} stroke={st} strokeWidth={1} />
              {s.id === initial && <polygon points={`${p.x - NW / 2 - 14},${p.y} ${p.x - NW / 2 - 4},${p.y - 5} ${p.x - NW / 2 - 4},${p.y + 5}`} fill={st} />}
              {s.terminal && <rect x={p.x - NW / 2 + 3} y={p.y - NH / 2 + 3} width={NW - 6} height={NH - 6} rx={4}
                fill="none" stroke={st} strokeWidth={0.5} strokeDasharray="3 2" />}
              {hotStates.has(s.id) && <rect x={p.x - NW / 2 - 4} y={p.y - NH / 2 - 4} width={NW + 8} height={NH + 8} rx={8}
                fill="none" stroke={accent} strokeWidth={1.3} filter="url(#gl)" opacity="0.75" />}
              <text x={p.x} y={p.y + 1} textAnchor="middle" dominantBaseline="middle"
                fill={tx} fontSize="8.5" fontFamily={mono} fontWeight={500}>
                {truncate(s.description || s.id, 30)}
              </text>
            </g>
          );
        })}
        </g>
      </svg>
    </div>
  );
}

function NextMoveApp() {
  const [view, setView] = useState("home");
  const [contractList, setContractList] = useState([]);
  const [fsms, setFsms] = useState({});
  const [selected, setSelected] = useState(null);
  const [selectedExpert, setSelectedExpert] = useState("fraught");
  const [uploading, setUploading] = useState(false);
  const [uploadResults, setUploadResults] = useState([]);
  const [question, setQuestion] = useState("");
  const [chatInput, setChatInput] = useState("");
  const [chatMessages, setChatMessages] = useState([]);
  const [qaResult, setQaResult] = useState(null);
  const [qaLoading, setQaLoading] = useState(false);
  const [dragOver, setDragOver] = useState(false);
  const [mapReady, setMapReady] = useState(false);
  const fileRef = useRef(null);
  const miniFileRef = useRef(null);

  const loadContracts = useCallback(async () => {
    try {
      const res = await fetch("/api/contracts");
      const data = await res.json();
      const contracts = data.contracts || [];
      setContractList(contracts);
      setSelected(current => current || contracts[0]?.contract_id || null);
    } catch (e) {
      console.error("Failed to load contracts:", e);
    }
  }, []);

  useEffect(() => { loadContracts(); }, [loadContracts]);

  useEffect(() => {
    if (!selected || fsms[selected]) return;
    fetch(`/api/fsm/${selected}`)
      .then(r => r.json())
      .then(fsm => setFsms(prev => ({ ...prev, [selected]: fsm })))
      .catch(e => console.error("Failed to load FSM:", e));
  }, [selected, fsms]);

  const fsm = fsms[selected];
  const layout = useMemo(() =>
    fsm ? autoLayout(fsm.states || [], fsm.transitions || [], fsm.initial_state) : null,
    [fsm]
  );
  useEffect(() => {
    setMapReady(false);
    if (!fsm || !layout) return;
    const timer = setTimeout(() => setMapReady(true), 650);
    return () => clearTimeout(timer);
  }, [fsm?.contract_id, layout, selectedExpert]);
  const activeExpert = getExpert(selectedExpert);
  const highlight = useMemo(() => getExpertHighlight(fsm, activeExpert), [fsm, activeExpert]);
  const activeAgent = qaResult?.agents?.find(agent => agent.id === selectedExpert);
  const visibleRules = useMemo(() => {
    if (!fsm) return [];
    const ids = new Set(highlight.ruleIds || []);
    return (fsm.rules || []).filter(rule => ids.has(rule.id)).slice(0, 10);
  }, [fsm, highlight]);
  const visibleStates = useMemo(() => {
    if (!fsm) return [];
    const ids = new Set(highlight.stateIds || []);
    return (fsm.states || []).filter(state => ids.has(state.id)).slice(0, 10);
  }, [fsm, highlight]);

  async function handleFiles(files) {
    if (!files?.length) return;
    setUploading(true);
    setUploadResults([]);
    try {
      const fileData = await Promise.all(
        Array.from(files).map(async f => ({ name: f.name, content: await f.text() }))
      );
      const res = await fetch("/api/upload", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ files: fileData }),
      });
      const data = await res.json();
      setUploadResults(data.results || []);
      setFsms({});
      await loadContracts();
      const firstOk = (data.results || []).find(r => r.ok);
      if (firstOk) setSelected(firstOk.contract_id);
    } catch (e) {
      setUploadResults([{ name: "upload", error: e.message }]);
    } finally {
      setUploading(false);
    }
  }

  function runQuestion(text) {
    const ask = (text || "").trim();
    if (!ask) return;
    setView("workspace");
    setQuestion(ask);
    setChatInput("");
    setQaLoading(true);
    setQaResult({
      question: ask,
      answer: "",
      agents: [],
      progress: [{ stage: "start", message: "Opening live inference stream.", state: "active" }],
    });
    setChatMessages(prev => [...prev, { role: "user", text: ask }]);

    if (!window.EventSource) {
      setQaResult({ error: "This browser does not support live inference streams." });
      setQaLoading(false);
      return;
    }

    let completed = false;
    const source = new EventSource(`/api/ask/stream?question=${encodeURIComponent(ask)}`);
    const addProgress = (stage, message, state = "active") => {
      setQaResult(prev => ({
        ...(prev || {}),
        progress: [...(prev?.progress || []), { stage, message, state }],
      }));
    };

    source.addEventListener("status", event => {
      const payload = JSON.parse(event.data);
      addProgress(payload.stage, payload.message);
    });

    source.addEventListener("gbrain", event => {
      const payload = JSON.parse(event.data);
      setQaResult(prev => ({ ...(prev || {}), gbrain: payload }));
      addProgress("gbrain", payload.available ? "Contract memory ready." : "Contract memory could not be refreshed.", payload.available ? "done" : "active");
    });

    source.addEventListener("agent_start", event => {
      const agent = JSON.parse(event.data);
      setQaResult(prev => ({
        ...(prev || {}),
        agents: [
          ...(prev?.agents || []),
          { ...agent, status: "running", output: "Querying shared GBrain memory and checking FSM paths..." },
        ],
      }));
      addProgress(agent.id, `${agent.name} started.`, "active");
    });

    source.addEventListener("agent_done", event => {
      const agent = { ...JSON.parse(event.data), status: "done" };
      setQaResult(prev => ({
        ...(prev || {}),
        agents: (prev?.agents || []).map(existing => existing.id === agent.id ? agent : existing),
      }));
      addProgress(agent.id, `${agent.name} finished.`, "done");
    });

    source.addEventListener("answer", event => {
      const payload = JSON.parse(event.data);
      setQaResult(prev => ({ ...(prev || {}), answer: payload.answer }));
      addProgress("synthesis", "Answer validated against the contract map.", "done");
    });

    source.addEventListener("memory_write", event => {
      const payload = JSON.parse(event.data);
      setQaResult(prev => ({ ...(prev || {}), memory_write: payload }));
      addProgress("writeback", payload.available ? "Final run written back into GBrain." : "Final run kept locally.", payload.available ? "done" : "active");
    });

    source.addEventListener("server_error", event => {
      const payload = JSON.parse(event.data);
      completed = true;
      setQaResult(prev => ({ ...(prev || {}), error: payload.error || "Inference failed." }));
      setQaLoading(false);
      source.close();
    });

    source.addEventListener("done", event => {
      const payload = JSON.parse(event.data);
      completed = true;
      setChatMessages(prev => [...prev, { role: "assistant", text: finalTakeaways(payload.answer || "Done.") }]);
      setQaResult(prev => ({
        ...payload,
        agents: (payload.agents || []).map(agent => ({ ...agent, status: "done" })),
        progress: [...(prev?.progress || []), { stage: "done", message: "Ready.", state: "done" }],
      }));
      setQaLoading(false);
      source.close();
    });

    source.onerror = () => {
      if (completed) return;
      completed = true;
      setQaResult(prev => ({ ...(prev || {}), error: "Live inference stream disconnected before completion." }));
      setQaLoading(false);
      source.close();
    };
  }

  const nStates = fsm ? (fsm.states || []).length : 0;
  const nTrans = fsm ? (fsm.transitions || []).length : 0;
  const nRules = fsm ? (fsm.rules || []).filter(r => r.mappable !== false).length : 0;
  const lastAssistantIndex = chatMessages.map(msg => msg.role).lastIndexOf("assistant");

  if (view === "home") {
    return (
      <div className="home">
        <div className="home-shell">
          <div className="home-brand">Babel</div>
          <h1>What should we Babel about today?</h1>
          <div className="prompt-card"
            onDragOver={e => { e.preventDefault(); setDragOver(true); }}
            onDragLeave={() => setDragOver(false)}
            onDrop={e => { e.preventDefault(); setDragOver(false); handleFiles(e.dataTransfer.files); }}>
            <textarea className="prompt-box"
              value={question}
              onChange={e => setQuestion(e.target.value)}
              onKeyDown={e => { if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) runQuestion(question); }}
              placeholder="Ask away"
            />
            <div className="prompt-actions">
              <label className={`file-trigger ${dragOver ? "over" : ""}`}>
                {uploading ? <span className="spinner"></span> : "Add contracts"}
                <input ref={fileRef} type="file" accept=".txt,.md,.json" multiple onChange={e => handleFiles(e.target.files)} />
              </label>
              <button className="btn btn-green" onClick={() => runQuestion(question)} disabled={qaLoading || !question.trim()}>
                {qaLoading ? "Thinking..." : "Ask Babel"}
              </button>
            </div>
            {uploadResults.length > 0 && (
              <div>
                {uploadResults.map((r, i) => (
                  <div key={i} className="upload-result">
                    {r.ok
                      ? <><span className="upload-ok">OK</span><span>{r.contract_id} · {r.state_count} states · {r.transition_count} transitions</span></>
                      : <><span className="upload-err">ERR</span><span>{r.name}: {r.error}</span></>
                    }
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="workspace">
      <aside className="contract-rail">
        <div className="brand">
          <h2>Babel</h2>
          <button className="btn" onClick={() => setView("home")}>New ask</button>
        </div>
        <div>
          <div className="rail-label">Contracts</div>
          <div className="contract-list">
            {contractList.map(c => (
              <button key={c.contract_id}
                className={`contract-item ${c.contract_id === selected ? "active" : ""}`}
                onClick={() => setSelected(c.contract_id)}>
                <span className="contract-title">{cleanId(c.contract_id)}</span>
                <span className="contract-meta">{c.state_count} states · {c.transition_count} transitions · {c.rule_count} rules</span>
              </button>
            ))}
          </div>
        </div>
        <label className="mini-upload">
          {uploading ? "Processing..." : "Add contracts"}
          <input ref={miniFileRef} type="file" accept=".txt,.md,.json" multiple onChange={e => handleFiles(e.target.files)} />
        </label>
      </aside>

      <main className="analysis-pane">
        <section className="workspace-head">
          <div>
            <h1>{selected ? cleanId(selected) : "Contract memory"}</h1>
            <p>{fsm?.parties?.length ? fsm.parties.join(" · ") : "Select a contract to inspect the executable FSM."}</p>
          </div>
          <div className="highlight-pills">
            <span className="highlight-pill">{nStates} states</span>
            <span className="highlight-pill">{nTrans} transitions</span>
            <span className="highlight-pill">{nRules} modeled rules</span>
          </div>
        </section>

        <section className="agent-grid">
          {EXPERTS.map(expert => {
            const agent = qaResult?.agents?.find(a => a.id === expert.id);
            const h = getExpertHighlight(fsm, expert);
            return (
              <button key={expert.id}
                className={`expert-tile ${selectedExpert === expert.id ? "active" : ""}`}
                style={{ "--agent-color": expert.color }}
                onClick={() => setSelectedExpert(expert.id)}>
                <div className="expert-top">
                  <span className="expert-dot"></span>
                  <span className="expert-state">{agent?.status || (qaLoading ? "queued" : "ready")}</span>
                </div>
                <div className="expert-name">{expert.name}</div>
                <div className="expert-focus">{expert.focus}</div>
                <div className="expert-hit">{h.stateIds.length} states · {h.ruleIds.length} rules</div>
              </button>
            );
          })}
        </section>

        <section className="map-card" style={{ "--agent-color": activeExpert.color }}>
          <div className="map-head">
            <div>
              <h2>{activeExpert.fullName} view</h2>
              <p>{activeExpert.name} findings with the matching contract path underneath.</p>
            </div>
          </div>
          {fsm && layout ? (
            <>
              <div className="expert-analysis-panel">
                <div className="expert-analysis-copy">
                  <h3>{activeExpert.name} findings</h3>
                  <ResponseBullets text={expertFindingText(activeAgent, activeExpert, qaLoading)} compact />
                  <div className="expert-analysis-status">
                    {highlight.stateIds.length} states, {highlight.transitionIds.length} transitions, {highlight.ruleIds.length} rules highlighted below.
                  </div>
                </div>
              </div>
              <div className="canvas">
                {mapReady ? (
                  <Diagram fsm={fsm} layout={layout} highlight={highlight} expert={activeExpert} />
                ) : (
                  <div className="map-loading">
                    <div className="map-loading-inner">
                      <div className="map-orbit"></div>
                      <div>Checking the contract map</div>
                    </div>
                  </div>
                )}
              </div>
            </>
          ) : (
            <div className="empty-state">Loading FSM...</div>
          )}
        </section>
      </main>

      <aside className="chat-rail">
        <div className="chat-scroll">
          {chatMessages.length === 0 && !qaResult && (
            <div className="msg assistant">Your answer will show here.</div>
          )}
          {qaResult?.error && <div className="msg assistant" style={{ background: "var(--red-bg)", color: "#7f1d1d" }}>{qaResult.error}</div>}
          {chatMessages.map((msg, i) => (
            <React.Fragment key={i}>
              {i === lastAssistantIndex && !qaLoading && qaResult?.progress?.length > 0 && (
                <div className="thinking-card">
                  <div className="thinking-title">
                    GBrain thinking
                  </div>
                  {qaResult.progress.map((item, stepIndex) => (
                    <div className="thinking-step" key={`${item.stage}-${stepIndex}`}>
                      <span className={`step-dot ${item.state || "active"}`}></span>
                      <span>{item.message}</span>
                    </div>
                  ))}
                </div>
              )}
              {msg.role === "assistant" ? (
                <div className="msg assistant final-answer">
                  <ResponseBullets text={msg.text} />
                </div>
              ) : (
                <div className="msg user">{msg.text}</div>
              )}
            </React.Fragment>
          ))}
          {qaLoading && qaResult?.progress?.length > 0 && (
            <div className="thinking-card">
              <div className="thinking-title">
                GBrain thinking
                <span className="thinking-dots"><span></span><span></span><span></span></span>
              </div>
              {qaResult.progress.map((item, stepIndex) => (
                <div className="thinking-step" key={`${item.stage}-${stepIndex}`}>
                  <span className={`step-dot ${item.state || "active"}`}></span>
                  <span>{item.message}</span>
                </div>
              ))}
            </div>
          )}
        </div>
        <div className="chat-compose">
          <textarea value={chatInput}
            onChange={e => setChatInput(e.target.value)}
            onKeyDown={e => { if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) runQuestion(chatInput); }}
            placeholder="Ask a follow-up..."
          />
          <button className="btn btn-green" onClick={() => runQuestion(chatInput)} disabled={qaLoading || !chatInput.trim()}>
            {qaLoading ? "..." : "Ask"}
          </button>
        </div>
      </aside>
    </div>
  );
}

function App() {
  const [contractList, setContractList] = useState([]);
  const [fsms, setFsms] = useState({});
  const [selected, setSelected] = useState(null);
  const [tab, setTab] = useState("diagram");
  const [uploading, setUploading] = useState(false);
  const [uploadResults, setUploadResults] = useState([]);
  const [question, setQuestion] = useState("");
  const [qaResult, setQaResult] = useState(null);
  const [qaLoading, setQaLoading] = useState(false);
  const [dragOver, setDragOver] = useState(false);
  const fileRef = useRef(null);

  // Load contract list
  const loadContracts = useCallback(async () => {
    try {
      const res = await fetch("/api/contracts");
      const data = await res.json();
      setContractList(data.contracts || []);
      if (!selected && data.contracts?.length) {
        setSelected(data.contracts[0].contract_id);
      }
    } catch (e) { console.error("Failed to load contracts:", e); }
  }, []);

  useEffect(() => { loadContracts(); }, [loadContracts]);

  // Load FSM when selected changes
  useEffect(() => {
    if (!selected || fsms[selected]) return;
    fetch(`/api/fsm/${selected}`)
      .then(r => r.json())
      .then(fsm => setFsms(prev => ({ ...prev, [selected]: fsm })))
      .catch(e => console.error("Failed to load FSM:", e));
  }, [selected]);

  const fsm = fsms[selected];
  const layout = useMemo(() =>
    fsm ? autoLayout(fsm.states || [], fsm.transitions || [], fsm.initial_state) : null,
    [fsm]
  );
  const english = useMemo(() => fsm ? decompileFSM(fsm) : "", [fsm]);

  // Upload handler
  async function handleFiles(files) {
    if (!files?.length) return;
    setUploading(true);
    setUploadResults([]);
    try {
      const fileData = await Promise.all(
        Array.from(files).map(async f => ({ name: f.name, content: await f.text() }))
      );
      const res = await fetch("/api/upload", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ files: fileData }),
      });
      const data = await res.json();
      setUploadResults(data.results || []);
      await loadContracts();
      const firstOk = (data.results || []).find(r => r.ok);
      if (firstOk) {
        setSelected(firstOk.contract_id);
        setFsms({});
      }
    } catch (e) {
      setUploadResults([{ name: "upload", error: e.message }]);
    } finally {
      setUploading(false);
    }
  }

  // Q&A handler
  function handleAsk() {
    if (!question.trim()) return;
    setQaLoading(true);
    setQaResult({
      question,
      answer: "",
      agents: [],
      progress: [{ stage: "start", message: "Opening live inference stream.", state: "active" }],
    });

    if (!window.EventSource) {
      setQaResult({ error: "This browser does not support live inference streams." });
      setQaLoading(false);
      return;
    }

    let completed = false;
    const source = new EventSource(`/api/ask/stream?question=${encodeURIComponent(question)}`);
    const addProgress = (stage, message, state = "active") => {
      setQaResult(prev => ({
        ...(prev || {}),
        progress: [...(prev?.progress || []), { stage, message, state }],
      }));
    };

    source.addEventListener("status", event => {
      const payload = JSON.parse(event.data);
      addProgress(payload.stage, payload.message);
    });

    source.addEventListener("gbrain", event => {
      const payload = JSON.parse(event.data);
      setQaResult(prev => ({ ...(prev || {}), gbrain: payload }));
      addProgress("gbrain", payload.available ? "GBrain memory synced." : "GBrain sync failed.", payload.available ? "done" : "active");
    });

    source.addEventListener("agent_start", event => {
      const agent = JSON.parse(event.data);
      setQaResult(prev => ({
        ...(prev || {}),
        agents: [
          ...(prev?.agents || []),
          { ...agent, status: "running", output: "Querying shared GBrain memory and checking FSM paths..." },
        ],
      }));
      addProgress(agent.id, `${agent.name} started.`, "active");
    });

    source.addEventListener("agent_done", event => {
      const agent = { ...JSON.parse(event.data), status: "done" };
      setQaResult(prev => ({
        ...(prev || {}),
        agents: (prev?.agents || []).map(existing =>
          existing.id === agent.id ? agent : existing
        ),
      }));
      addProgress(agent.id, `${agent.name} returned with GBrain-backed analysis.`, "done");
    });

    source.addEventListener("answer", event => {
      const payload = JSON.parse(event.data);
      setQaResult(prev => ({ ...(prev || {}), answer: payload.answer }));
      addProgress("synthesis", "Synthesizer produced the final FSM-validated answer.", "done");
    });

    source.addEventListener("memory_write", event => {
      const payload = JSON.parse(event.data);
      setQaResult(prev => ({ ...(prev || {}), memory_write: payload }));
      addProgress("writeback", payload.available ? "Final run written back into GBrain." : "Final run kept locally.", payload.available ? "done" : "active");
    });

    source.addEventListener("server_error", event => {
      const payload = JSON.parse(event.data);
      completed = true;
      setQaResult(prev => ({ ...(prev || {}), error: payload.error || "Inference failed." }));
      setQaLoading(false);
      source.close();
    });

    source.addEventListener("done", event => {
      const payload = JSON.parse(event.data);
      completed = true;
      setQaResult(prev => ({
        ...payload,
        agents: (payload.agents || []).map(agent => ({ ...agent, status: "done" })),
        progress: [...(prev?.progress || []), { stage: "done", message: "Live inference complete.", state: "done" }],
      }));
      setQaLoading(false);
      source.close();
    });

    source.onerror = () => {
      if (completed) return;
      completed = true;
      setQaResult(prev => ({
        ...(prev || {}),
        error: "Live inference stream disconnected before completion.",
      }));
      setQaLoading(false);
      source.close();
    };
  }

  const nStates = fsm ? (fsm.states || []).length : 0;
  const nTrans = fsm ? (fsm.transitions || []).length : 0;
  const nRules = fsm ? (fsm.rules || []).filter(r => r.mappable !== false).length : 0;

  const tabs = [
    { id: "diagram", label: `Diagram (${nStates})` },
    ...(nRules ? [{ id: "rules", label: `Rules (${nRules})` }] : []),
    { id: "english", label: "English" },
  ];

  return (<>
    {/* ── Header ── */}
    <header className="hdr">
      <h1>Babel</h1>
      <div className="hdr-pills">
        {contractList.map(c =>
          <span key={c.contract_id} className="pill" style={{ cursor: "pointer", borderColor: c.contract_id === selected ? "var(--green)" : undefined }}
            onClick={() => setSelected(c.contract_id)}>
            {cleanId(c.contract_id)}: {c.state_count}S / {c.transition_count}T
          </span>
        )}
      </div>
    </header>

    {/* ── Main ── */}
    <div className="main">

      {/* ── Sidebar ── */}
      <div className="sidebar">

        {/* Upload */}
        <div className="card">
          <h2>Upload Contracts</h2>
          <div
            className={`dropzone${dragOver ? " over" : ""}`}
            onDragOver={e => { e.preventDefault(); setDragOver(true); }}
            onDragLeave={() => setDragOver(false)}
            onDrop={e => { e.preventDefault(); setDragOver(false); handleFiles(e.dataTransfer.files); }}
            onClick={() => fileRef.current?.click()}
          >
            <p>{uploading ? "Processing contracts…" : "Drop .txt or .json files here"}</p>
            <small>.txt files run through the full pipeline (requires API key). .json files load FSMs directly.</small>
            <input ref={fileRef} type="file" accept=".txt,.md,.json" multiple
              onChange={e => handleFiles(e.target.files)} />
            {uploading && <div style={{ marginTop: 12 }}><span className="spinner"></span></div>}
          </div>
          {uploadResults.length > 0 && (
            <div style={{ marginTop: 10 }}>
              {uploadResults.map((r, i) => (
                <div key={i} className="upload-result">
                  {r.ok
                    ? <><span className="upload-ok">OK</span> <span>{r.contract_id} &mdash; {r.state_count} states, {r.transition_count} transitions</span></>
                    : <><span className="upload-err">ERR</span> <span>{r.name}: {r.error}</span></>
                  }
                </div>
              ))}
            </div>
          )}
        </div>

        {/* Contract list */}
        <div className="card">
          <h2>Loaded Contracts ({contractList.length})</h2>
          {contractList.length === 0 ? (
            <p style={{ fontSize: 13, color: "var(--muted)" }}>No contracts loaded yet. Upload files or pre-populate the output/ directory.</p>
          ) : (
            <div className="clist">
              {contractList.map(c => (
                <div key={c.contract_id}
                  className={`citem${c.contract_id === selected ? " active" : ""}`}
                  onClick={() => setSelected(c.contract_id)}>
                  <span className="cname">{cleanId(c.contract_id)}</span>
                  <span className="cmeta">{c.state_count}S &middot; {c.transition_count}T &middot; {c.rule_count}R</span>
                </div>
              ))}
            </div>
          )}
        </div>

        {/* Q&A */}
        <div className="card">
          <h2>Ask Multi-Agent GBrain</h2>
          <textarea className="qa-input" value={question}
            onChange={e => setQuestion(e.target.value)}
            onKeyDown={e => { if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) handleAsk(); }}
            placeholder="Ask the specialist agents to maximize an outcome across the FSMs..." />
          <div className="qa-row">
            <button className="btn btn-green" onClick={handleAsk} disabled={qaLoading || !question.trim()}>
              {qaLoading ? "Thinking…" : "Ask"}
            </button>
          </div>
          {qaResult && (
            <>
              {qaResult.error
                ? <div className="qa-answer" style={{ background: "var(--red-bg)", color: "#7f1d1d" }}>{qaResult.error}</div>
                : qaResult.answer && <div className="qa-answer">{qaResult.answer}</div>
              }
              {qaResult.progress?.length > 0 && (
                <div className="qa-progress">
                  {qaResult.progress.map((item, i) => (
                    <div className="progress-row" key={`${item.stage}-${i}`}>
                      <span className={`progress-dot ${item.state || "active"}`}></span>
                      <span>{item.message}</span>
                    </div>
                  ))}
                </div>
              )}
              {qaResult.gbrain && (
                <div className="qa-gbrain">
                  <strong style={{ fontSize: 10 }}>Shared GBrain memory {qaResult.gbrain.available ? "(synced)" : "(not available)"}</strong>
                  <br />{qaResult.gbrain.output || "No output."}
                </div>
              )}
              {qaResult.agents?.length > 0 && (
                <div className="agent-grid">
                  {qaResult.agents.map(agent => (
                    <div className={`agent-card ${agent.status === "running" ? "running" : ""}`} key={agent.id}>
                      <h3>{agent.name}<span className="agent-status">{agent.status || "done"}</span></h3>
                      <div className="agent-focus">{agent.focus}</div>
                      <div className="agent-memory">
                        <strong>GBrain query:</strong> {agent.memory?.query || "No query."}
                        {"\n\n"}
                        <strong>Memory hits:</strong>
                        {"\n"}{agent.memory?.output || "No hits."}
                      </div>
                      <div className="agent-output">{agent.output || "No agent output."}</div>
                    </div>
                  ))}
                </div>
              )}
              {qaResult.memory_write && (
                <div className="memory-write">
                  <strong style={{ fontSize: 10 }}>Written back to GBrain {qaResult.memory_write.available ? "(imported)" : "(local only)"}</strong>
                  <br />{qaResult.memory_write.path || ""}
                  {qaResult.memory_write.output ? `\n${qaResult.memory_write.output}` : ""}
                </div>
              )}
            </>
          )}
        </div>
      </div>

      {/* ── Content ── */}
      <div className="content">
        {!selected || !fsm ? (
          <div className="card">
            <div className="empty-state">
              <h3>{!selected ? "Select a Contract" : "Loading…"}</h3>
              <p>{!selected
                ? "Upload contract files or select a pre-loaded contract from the sidebar to view its finite state machine."
                : "Fetching FSM data…"
              }</p>
              {!selected && !contractList.length && (
                <p style={{ marginTop: 16, fontSize: 12, color: "var(--muted)" }}>
                  Tip: Place FSM JSON files in output/&lt;contract_id&gt;/fsm.json and restart the server, or upload .txt/.json files above.
                </p>
              )}
            </div>
          </div>
        ) : (
          <>
            {/* Contract header */}
            <div className="card" style={{ paddingBottom: 0 }}>
              <div style={{ display: "flex", alignItems: "baseline", gap: 12, marginBottom: 8 }}>
                <h1 style={{ fontSize: 20, fontWeight: 750 }}>{fsm.contract_id}</h1>
                <span style={{ fontSize: 12, color: "var(--muted)", fontFamily: mono }}>
                  {nStates} states &middot; {nTrans} transitions &middot; {nRules} rules
                </span>
              </div>
              {fsm.parties?.length > 0 && (
                <p style={{ fontSize: 12, color: "var(--muted)", marginBottom: 10 }}>
                  Parties: {fsm.parties.join(", ")}
                </p>
              )}
              <div className="tabs">
                {tabs.map(t =>
                  <button key={t.id} className={`tab${tab === t.id ? " active" : ""}`}
                    onClick={() => setTab(t.id)}>{t.label}</button>
                )}
              </div>
            </div>

            {/* Tab content */}
            {tab === "diagram" && layout && (
              <div className="canvas">
                <Diagram fsm={fsm} layout={layout} />
              </div>
            )}

            {tab === "diagram" && (
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
                {/* States list */}
                <div className="card">
                  <h2>States</h2>
                  {(fsm.states || []).map(s => (
                    <div key={s.id} style={{
                      padding: "8px 10px", borderRadius: 5, marginBottom: 4,
                      background: s.id === fsm.initial_state ? "var(--blue-bg)" : s.terminal ? "var(--red-bg)" : "#f9fbf8",
                      border: "1px solid var(--line)", fontSize: 12,
                    }}>
                      <div style={{ fontWeight: 650, fontFamily: mono, fontSize: 11 }}>
                        {s.id}
                        {s.id === fsm.initial_state && <span style={{ color: "var(--blue)", marginLeft: 6 }}>(initial)</span>}
                        {s.terminal && <span style={{ color: "var(--red)", marginLeft: 6 }}>(terminal)</span>}
                      </div>
                      <div style={{ color: "var(--muted)", marginTop: 2 }}>{s.description}</div>
                      {(s.active_rule_ids || []).length > 0 && (
                        <div style={{ marginTop: 4, fontSize: 10, color: "var(--violet)", fontFamily: mono }}>
                          Rules: {s.active_rule_ids.join(", ")}
                        </div>
                      )}
                    </div>
                  ))}
                </div>

                {/* Transitions list */}
                <div className="card">
                  <h2>Transitions</h2>
                  {(fsm.transitions || []).map(t => (
                    <div key={t.id} style={{
                      padding: "8px 10px", borderRadius: 5, marginBottom: 4,
                      background: "#f9fbf8", border: "1px solid var(--line)", fontSize: 12,
                    }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 2 }}>
                        <span style={{ fontWeight: 650, fontFamily: mono, fontSize: 10 }}>{t.id}</span>
                        <span className="rule-badge" style={{
                          background: evColor(t.event_type) + "22",
                          color: evColor(t.event_type),
                          border: `1px solid ${evColor(t.event_type)}44`,
                        }}>{(t.event_type || "").replace(/_/g, " ")}</span>
                      </div>
                      <div style={{ color: "var(--muted)", fontFamily: mono, fontSize: 10 }}>
                        {(t.from_states || []).join(", ")} &rarr; {t.to_state}
                      </div>
                      {t.guard && <div style={{ fontSize: 10, color: "var(--amber)", marginTop: 2, fontFamily: mono }}>Guard: {t.guard}</div>}
                      {t.description && <div style={{ fontSize: 11, color: "var(--muted)", marginTop: 2 }}>{t.description}</div>}
                    </div>
                  ))}
                </div>
              </div>
            )}

            {tab === "rules" && (
              <div className="card">
                {(fsm.rules || []).filter(r => r.mappable !== false).map(r => {
                  const c = RC[r.type] || RC.COVENANT;
                  return (
                    <div key={r.id} className="rule-card" style={{ borderLeftColor: c.border, borderLeftWidth: 3 }}>
                      <div className="rule-head">
                        <span className="rule-badge" style={{ background: c.bg, color: c.fg }}>{r.id}</span>
                        <span className="rule-badge" style={{ background: c.bg, color: c.fg }}>{r.type}</span>
                        <span style={{ fontSize: 11, color: "var(--muted)" }}>{r.party} &rarr; {r.counterparty}</span>
                      </div>
                      <div className="rule-action">{r.action}</div>
                      {r.description && <div className="rule-desc">{r.description}</div>}
                      {(r.triggers || []).map((t, i) => (
                        <div key={i} style={{ fontSize: 11, color: "var(--blue)", marginTop: 3 }}>
                          Trigger [{t.type}]: {t.condition}
                        </div>
                      ))}
                      {(r.effects || []).map((e, i) => (
                        <div key={i}>
                          <div style={{ fontSize: 11, color: "var(--violet)", marginTop: 3 }}>
                            Effect [{e.type}]: {e.description}
                          </div>
                          {e.payment_formula && (
                            <div className="rule-formula mono">Formula: {e.payment_formula}{e.cap ? ` (cap: $${e.cap})` : ""}</div>
                          )}
                        </div>
                      ))}
                    </div>
                  );
                })}
                {(fsm.unmappable_rules || []).length > 0 && (
                  <>
                    <h2 style={{ marginTop: 16 }}>Unmappable Rules ({fsm.unmappable_rules.length})</h2>
                    {fsm.unmappable_rules.map(r => (
                      <div key={r.id} className="rule-card" style={{ borderLeftColor: "var(--amber)", borderLeftWidth: 3 }}>
                        <div className="rule-head">
                          <span className="rule-badge" style={{ background: "var(--amber-bg)", color: "var(--amber)" }}>{r.id} {r.type}</span>
                        </div>
                        <div className="rule-desc">{r.description || r.action}</div>
                        {r.unmappable_reason && (
                          <div style={{ fontSize: 11, color: "var(--amber)", marginTop: 3 }}>Reason: {r.unmappable_reason}</div>
                        )}
                      </div>
                    ))}
                  </>
                )}
              </div>
            )}

            {tab === "english" && (
              <div className="card">
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12 }}>
                  <span className="rule-badge" style={{ background: "var(--green-bg)", color: "var(--green)" }}>DETERMINISTIC</span>
                  <span style={{ fontSize: 11, color: "var(--muted)", fontFamily: mono }}>Template-based &middot; No LLM &middot; Diff-safe</span>
                </div>
                <pre className="english-pre mono">{english}</pre>
              </div>
            )}
          </>
        )}
      </div>
    </div>
  </>);
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(NextMoveApp));
</script>
</body>
</html>
