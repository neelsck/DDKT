<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Maria's Bakery FSM Console</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #17201b;
      --muted: #65716b;
      --line: #d9e2dc;
      --paper: #f8faf6;
      --panel: #ffffff;
      --green: #157f5b;
      --blue: #246b9f;
      --amber: #a86308;
      --red: #b83b3b;
      --violet: #7257a8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--paper);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.45;
    }
    header {
      border-bottom: 1px solid var(--line);
      background: #fff;
      padding: 18px clamp(16px, 3vw, 34px);
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 5;
    }
    h1 {
      margin: 0;
      font-size: clamp(20px, 2.2vw, 30px);
      font-weight: 780;
      letter-spacing: 0;
    }
    .status {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
      color: var(--muted);
      font-size: 13px;
    }
    .pill {
      border: 1px solid var(--line);
      background: #f5f8f4;
      border-radius: 999px;
      padding: 5px 9px;
      white-space: nowrap;
    }
    main {
      padding: 22px clamp(16px, 3vw, 34px) 44px;
      display: grid;
      gap: 18px;
    }
    .query {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: stretch;
    }
    textarea {
      width: 100%;
      min-height: 98px;
      resize: vertical;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      border-radius: 8px;
      padding: 14px;
      font: inherit;
      font-size: 15px;
      outline-color: var(--green);
    }
    button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: 8px;
      padding: 10px 13px;
      font-weight: 720;
      cursor: pointer;
      min-height: 42px;
    }
    button.primary {
      background: var(--green);
      border-color: var(--green);
      color: #fff;
      min-width: 112px;
    }
    button:disabled { opacity: .58; cursor: wait; }
    .samples {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }
    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1.08fr) minmax(340px, .92fr);
      gap: 18px;
      align-items: start;
    }
    section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }
    h2 {
      margin: 0 0 12px;
      font-size: 15px;
      letter-spacing: 0;
    }
    .answer {
      font-size: 16px;
      margin: 0;
    }
    .objectives {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 14px;
    }
    .objective {
      border-left: 3px solid var(--blue);
      background: #eef6fb;
      padding: 6px 8px;
      border-radius: 5px;
      font-size: 13px;
      color: #20475f;
    }
    .scenario-list {
      display: grid;
      gap: 10px;
    }
    .scenario {
      width: 100%;
      text-align: left;
      border-radius: 8px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: start;
    }
    .scenario.active {
      border-color: var(--green);
      box-shadow: 0 0 0 2px rgba(21, 127, 91, .12);
    }
    .scenario-title {
      display: block;
      font-size: 14px;
      margin-bottom: 4px;
    }
    .scenario-summary {
      display: block;
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
    }
    .score {
      font-variant-numeric: tabular-nums;
      color: var(--green);
      font-size: 13px;
    }
    .metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }
    .metric {
      border-top: 3px solid var(--line);
      background: #fafcf9;
      border-radius: 6px;
      padding: 9px;
      min-height: 72px;
    }
    .metric.good { border-top-color: var(--green); }
    .metric.warn { border-top-color: var(--amber); }
    .metric.bad { border-top-color: var(--red); }
    .metric b {
      display: block;
      font-size: 18px;
      font-variant-numeric: tabular-nums;
      overflow-wrap: anywhere;
    }
    .metric span {
      color: var(--muted);
      font-size: 12px;
    }
    .split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 14px;
    }
    ul {
      margin: 8px 0 0;
      padding-left: 18px;
    }
    li { margin: 4px 0; }
    .contract {
      border-top: 1px solid var(--line);
      padding-top: 12px;
      margin-top: 12px;
    }
    .contract-head {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: baseline;
    }
    .ok { color: var(--green); font-weight: 800; }
    .fail { color: var(--red); font-weight: 800; }
    .timeline {
      display: grid;
      gap: 7px;
      margin-top: 10px;
    }
    .event {
      display: grid;
      grid-template-columns: 86px minmax(0, 1fr);
      gap: 9px;
      font-size: 13px;
      color: var(--muted);
    }
    .event code, pre, code {
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      letter-spacing: 0;
    }
    .event code {
      color: var(--blue);
      white-space: normal;
    }
    pre {
      background: #f2f5f0;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      overflow: auto;
      max-height: 260px;
      white-space: pre-wrap;
      margin: 0;
      font-size: 12px;
    }
    .empty {
      color: var(--muted);
      padding: 22px 0;
    }
    @media (max-width: 920px) {
      header { align-items: flex-start; flex-direction: column; }
      .query, .layout, .split { grid-template-columns: 1fr; }
      .metrics { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      button.primary { width: 100%; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Maria's Bakery FSM Console</h1>
    <div class="status" id="contractStatus"></div>
  </header>
  <main>
    <div>
      <div class="query">
        <textarea id="question">Should Maria's Bakery sign the wholesale route and buy the refrigerated van now, or should she wait or use a rental bridge first? Explain the decision using the four contracts, the money facts, the insurance risk, and the timing of the delivery obligations.</textarea>
        <button class="primary" id="askBtn">Ask</button>
      </div>
      <div class="samples">
        <button data-q="Maximize wholesale revenue and supplier rebate while avoiding termination.">Revenue + rebate</button>
        <button data-q="What scenario minimizes penalties and route termination risk?">Lowest risk</button>
        <button data-q="What scenario maximizes the chance the van is operational before year-end for later tax analysis?">Year-end van</button>
        <button data-q="What happens if insurance slips and Maria has no rental bridge?">Insurance slip</button>
      </div>
    </div>
    <div class="layout">
      <div>
        <section>
          <h2>Recommendation</h2>
          <p class="answer" id="answer">Run a question to rank and verify scenarios.</p>
          <div class="objectives" id="objectives"></div>
        </section>
        <section style="margin-top:18px">
          <h2>Scenario Ranking</h2>
          <div class="scenario-list" id="scenarioList"></div>
        </section>
        <section style="margin-top:18px">
          <h2>GBrain Hits</h2>
          <pre id="gbrainOutput">Waiting for first query.</pre>
        </section>
      </div>
      <div>
        <section>
          <h2>Selected Scenario</h2>
          <div id="scenarioDetail" class="empty">No scenario selected.</div>
        </section>
      </div>
    </div>
  </main>
  <script>
    const $ = (id) => document.getElementById(id);
    const money = (n) => Number(n || 0).toLocaleString("en-US", { style: "currency", currency: "USD", maximumFractionDigits: 0 });
    let current = null;
    let selectedId = null;

    async function loadContracts() {
      const res = await fetch("/api/contracts");
      const data = await res.json();
      $("contractStatus").innerHTML = data.contracts.map(c => `<span class="pill">${c.contract_id.replace("C_", "").replace("_contract", "")}: ${c.state_count} states / ${c.transition_count} transitions</span>`).join("");
    }

    function renderObjectives(objectives) {
      $("objectives").innerHTML = Object.entries(objectives)
        .sort((a, b) => b[1] - a[1])
        .map(([k, v]) => `<span class="objective">${k.replaceAll("_", " ")} × ${v}</span>`)
        .join("");
    }

    function renderScenarioList() {
      const list = $("scenarioList");
      list.innerHTML = current.scenarios.map((s, i) => `
        <button class="scenario ${s.id === selectedId ? "active" : ""}" data-id="${s.id}">
          <span>
            <span class="scenario-title">${i + 1}. ${s.title}</span>
            <span class="scenario-summary">${s.summary}</span>
          </span>
          <span class="score">${s.score.toFixed(2)}</span>
        </button>
      `).join("");
      list.querySelectorAll("button").forEach(btn => btn.addEventListener("click", () => {
        selectedId = btn.dataset.id;
        renderScenarioList();
        renderScenarioDetail();
      }));
    }

    function metricClass(label, value) {
      if (label === "route" || label === "verified") return value ? "good" : "bad";
      if (label === "penalties") return value > 0 ? "warn" : "good";
      return "";
    }

    function renderScenarioDetail() {
      const s = current.scenarios.find(x => x.id === selectedId) || current.scenarios[0];
      if (!s) return;
      const m = s.metrics;
      const detail = $("scenarioDetail");
      const penaltyTotal = (m.late_credits || 0) + (m.lease_fees || 0);
      const metrics = [
        ["ending cash", money(m.ending_cash), "cash after modeled inflows and outflows", ""],
        ["route", m.route_preserved ? "Preserved" : "At risk", "wholesale FSM status", metricClass("route", m.route_preserved)],
        ["rebate", money(m.supplier_rebate), "supplier credit earned", m.supplier_rebate ? "good" : ""],
        ["penalties", money(penaltyTotal), "late credits plus lease fees", metricClass("penalties", penaltyTotal)]
      ];
      const verificationRows = Object.entries(s.verification.contracts).map(([cid, v]) => `
        <div class="contract">
          <div class="contract-head">
            <strong>${cid}</strong>
            <span class="${v.ok ? "ok" : "fail"}">${v.ok ? "verified" : "mismatch"}: ${v.actual_state}</span>
          </div>
          <div class="timeline">
            ${(s.results[cid].log.length ? s.results[cid].log : [{ timestamp: "", event_type: "no_events", state_before: s.results[cid].initial_state, state_after: s.results[cid].final_state, transition_id: "none", transition_description: "No modeled events." }]).map(row => `
              <div class="event">
                <span>${row.timestamp || "—"}</span>
                <span><code>${row.event_type}</code> ${row.transition_id ? `via ${row.transition_id}` : ""} · ${row.state_before} → ${row.state_after}${row.note ? ` · ${row.note}` : ""}</span>
              </div>
            `).join("")}
          </div>
        </div>
      `).join("");

      detail.innerHTML = `
        <p class="answer">${s.summary}</p>
        <div class="metrics">
          ${metrics.map(([label, value, caption, cls]) => `<div class="metric ${cls}"><b>${value}</b><span>${label}<br>${caption}</span></div>`).join("")}
        </div>
        <div class="split">
          <div>
            <h2 style="margin-top:0">Assumptions</h2>
            <ul>${s.assumptions.map(a => `<li>${a}</li>`).join("")}</ul>
          </div>
          <div>
            <h2 style="margin-top:0">FSM Final States</h2>
            <ul>${Object.entries(m.final_states).map(([cid, state]) => `<li><code>${cid}</code>: ${state}</li>`).join("")}</ul>
          </div>
        </div>
        <h2 style="margin-top:18px">Verification Trail</h2>
        ${verificationRows}
      `;
    }

    async function ask() {
      const btn = $("askBtn");
      btn.disabled = true;
      btn.textContent = "Running";
      try {
        const res = await fetch("/api/ask", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question: $("question").value })
        });
        current = await res.json();
        if (!res.ok) throw new Error(current.error || "Request failed");
        selectedId = current.scenarios[0]?.id;
        $("answer").textContent = current.answer;
        renderObjectives(current.objectives);
        renderScenarioList();
        renderScenarioDetail();
        $("gbrainOutput").textContent = current.gbrain?.output || "No GBrain output returned.";
      } catch (err) {
        $("answer").textContent = err.message;
      } finally {
        btn.disabled = false;
        btn.textContent = "Ask";
      }
    }

    $("askBtn").addEventListener("click", ask);
    document.querySelectorAll("[data-q]").forEach(btn => btn.addEventListener("click", () => {
      $("question").value = btn.dataset.q;
      ask();
    }));
    loadContracts();
    ask();
  </script>
</body>
</html>
